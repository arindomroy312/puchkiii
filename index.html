<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Forever</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">

<style>
html { font-size: 16px; }

body{
  margin:0;
  background:black;
  color:white;
  font-family:'Cormorant Garamond', serif;
  overflow-x:hidden;
}

/* SPARKLE */
.sparkle{
  position:fixed;
  pointer-events:none;
  font-size:12px;
  animation:fadeSpark 0.7s forwards;
}
@keyframes fadeSpark{
  0%{opacity:1; transform:translateY(0);}
  100%{opacity:0; transform:translateY(-15px);}
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  background:radial-gradient(circle,#3b0000 0%,#000 60%);
}

.hero h1{
  font-size:4rem;
  margin:10px 0;
}

.hero p{
  font-size:1.5rem;
  margin-top:20px;
}

/* Sections */
.section{
  min-height:100vh;
  padding:60px 20px;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(to bottom,#000,#1a0000,#000);
}

.section h2{
  font-size:2.8rem;
  margin-bottom:30px;
}

/* PHOTO */
.photo{
  width:300px;
  max-width:90%;
  height:400px;
  border-radius:20px;
  overflow:hidden;
  border:4px solid #ffd700;
  box-shadow:0 0 40px rgba(255,215,0,0.6);
  margin-bottom:30px;
}
.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* FLOATING REASONS */
.floating-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  max-width:1100px;
  width:100%;
}
.float-box{
  padding:20px;
  border-radius:20px;
  border:2px solid #ffd700;
  background:linear-gradient(135deg,rgba(255,105,180,0.3),rgba(139,0,0,0.8));
  animation:float 6s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* BUTTON */
button{
  padding:22px 60px;
  font-size:1.8rem;
  font-weight:bold;
  background:linear-gradient(45deg,#ff4d6d,#ffd700,#ff85a1,#ffd700);
  background-size:300% 300%;
  border:none;
  color:#3b0000;
  border-radius:60px;
  cursor:pointer;
  transition:0.4s;
  box-shadow:0 0 45px rgba(255,105,180,0.9);
  animation:gradientMove 5s ease infinite, pulse 2s infinite;
  margin-top:20px;
}
button:hover{ transform:scale(1.1); }

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
@keyframes pulse{
  0%{box-shadow:0 0 35px rgba(255,105,180,0.8);}
  50%{box-shadow:0 0 65px rgba(255,20,147,1);}
  100%{box-shadow:0 0 35px rgba(255,105,180,0.8);}
}

/* LETTER */
.letter-container{
  max-width:800px;
  width:95%;
  margin-top:40px;
  padding:40px;
  border-radius:25px;
  background:linear-gradient(135deg,#fff0f5,#ffe4e1,#fff8dc);
  color:#5a0000;
  font-family:'Dancing Script',cursive;
  box-shadow:0 0 60px rgba(255,105,180,0.7);
  font-size:1.4rem;
  line-height:1.8;
  animation:fadeIn 1s ease forwards;
}
@keyframes fadeIn{
  from{opacity:0; transform:scale(0.95);}
  to{opacity:1; transform:scale(1);}
}

.hidden{display:none;}

/* POPUP */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#fff0f5,#ffe4e1,#fff0f5);
  border:3px solid #ff69b4;
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 60px rgba(255,105,180,0.8);
  z-index:999;
  width:90%;
  max-width:400px;
}

/* Responsive */
@media(max-width:768px){
  .hero h1{ font-size:2.5rem; }
  .section h2{ font-size:2rem; }
  button{ font-size:1.4rem; padding:18px 40px; }
  .letter-container{ font-size:1.2rem; padding:25px; }
}
</style>
</head>

<body>

<audio id="bgMusic" preload="auto" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<section class="hero">
<h1 style="color:#8B0000;">In Every Lifetime…</h1>
<h1 style="color:#ffd700;">It Would Still Be You.</h1>
<p style="color:#ffd700;">My heart doesn’t hesitate. It chooses you.</p>
</section>

<!-- (Rest of your HTML remains SAME as before from sections onward) -->

<script>
/* Sparkle */
document.addEventListener("mousemove", function(e){
  const sparkle=document.createElement("div");
  sparkle.className="sparkle";
  sparkle.innerHTML="✨";
  sparkle.style.left=e.clientX+"px";
  sparkle.style.top=e.clientY+"px";
  document.body.appendChild(sparkle);
  setTimeout(()=>sparkle.remove(),700);
});
</script>

</body>
</html>
